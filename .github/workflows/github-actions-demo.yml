name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-tests:
    name: WeatherLive Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project WeatherLive.xcodeproj -scheme WeatherLive

      - name: Run WeatherLiveTests
        run: |
          xcodebuild test \
            -project WeatherLive.xcodeproj \
            -scheme WeatherLive \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing: WeatherLiveTests
